<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>FlightFind - 出發前詢問頁 / 首頁</title>
<style>
:root{
  --bg:#FFFFFF; --bg2:#F4F3EF; --bg3:#EDEBE4;
  --text:#1A1A1A; --text2:#6B6B66; --border:rgba(0,0,0,0.12);
  --fill:#F5C4B3; --ftext:#712B13; --strong:#D85A30; --cta-text:#FAECE7;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1C1C1A; --bg2:#2A2A27; --bg3:#38372F;
    --text:#F5F4EF; --text2:#B4B2A9; --border:rgba(255,255,255,0.15);
    --fill:#993C1D; --ftext:#F5C4B3; --strong:#F0997B; --cta-text:#4A1B0C;
  }
}
body{font-family:"SF Pro","PingFang TC",-apple-system,sans-serif;background:var(--bg2);margin:0;padding:24px;}
.wrap{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.phone{width:280px;border-radius:32px;background:var(--bg3);border:0.5px solid var(--border);padding:10px;}
.screen{background:var(--bg);border-radius:24px;padding:18px 15px;min-height:540px;display:flex;flex-direction:column;gap:14px;}
.logo{font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:4px;}
.logo span{color:var(--strong);}
.logo i{width:14px;height:14px;background:#EF9F27;border-radius:3px;display:inline-block;transform:rotate(20deg);}
.seg{display:flex;background:var(--bg3);border-radius:12px;padding:3px;gap:2px;}
.seg span{flex:1;text-align:center;font-size:13px;padding:9px 2px;border-radius:8px;color:var(--text2);}
.seg span.on{background:var(--fill);color:var(--ftext);font-weight:500;}
.row{display:flex;align-items:center;gap:12px;border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;}
.row div{display:flex;flex-direction:column;gap:3px;}
.label{font-size:12px;color:var(--text2);}
.val{font-size:15px;font-weight:500;color:var(--text);}
.badge{display:inline-flex;align-items:center;gap:7px;background:var(--fill);color:var(--ftext);font-size:13px;font-weight:500;padding:8px 12px;border-radius:8px;}
.cta{background:var(--strong);color:var(--cta-text);text-align:center;font-size:16px;font-weight:500;padding:14px;border-radius:8px;margin-top:auto;}
.card{border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
p{margin:0;color:var(--text);}
</style>
</head>
<body>
<div class="wrap">

<div class="phone">
<div class="screen">
<div class="logo">flight<span>find</span><i></i></div>
<p style="font-size:17px;font-weight:500;">出發前，先聊聊你的計畫</p>
<div class="seg"><span class="on">月份</span><span>明確日期</span><span>日期區間</span></div>
<div class="row"><div><span class="label">預計月份</span><span class="val">2026年10月</span></div></div>
<div class="row"><div><span class="label">想去的城市</span><span class="val">大阪（KIX・ITM）</span></div></div>
<div class="row"><div><span class="label">人數</span><span class="val">2 位成人</span></div></div>
<span class="badge">10月偏貴，11月更划算</span>
<span class="badge">2 人同行，找到相鄰座位機率高</span>
<div class="cta">開始搜尋</div>
</div>
</div>

<div class="phone">
<div class="screen">
<div class="logo">flight<span>find</span><i></i></div>
<div class="seg"><span class="on">快速搜尋</span><span>外站票</span><span>反向購票</span></div>
<div class="card" style="background:var(--fill);border-color:transparent;">
<span style="font-size:15px;font-weight:500;color:var(--ftext);">智慧比價建議</span>
<p style="font-size:13px;color:var(--ftext);">這趟行程用「反向購票」省最多，比快速搜尋便宜 32%</p>
<span style="font-size:13px;color:var(--ftext);font-weight:500;">查看方案 →</span>
</div>
<p style="font-size:13px;color:var(--text2);">最便宜 3 班</p>
<div class="card">
<div style="display:flex;justify-content:space-between;"><span class="val">中華航空 CI102</span><span class="val" style="color:var(--strong);">$8,450</span></div>
<p style="font-size:12px;color:var(--text2);">08:20 → 12:05・直飛・含行李</p>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;"><span class="val">長榮航空 BR118</span><span class="val" style="color:var(--strong);">$9,120</span></div>
<p style="font-size:12px;color:var(--text2);">10:05 → 13:50・直飛・含行李</p>
</div>
</div>
</div>

</div>
</body>
</html>
